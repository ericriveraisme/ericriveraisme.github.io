<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article Preview - Learning in Public</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        line-height: 1.65;
      }

      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 24px 80px;
      }

      .card {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 14px;
        padding: 28px;
        backdrop-filter: blur(6px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        line-height: 1.2;
      }

      .meta {
        color: #94a3b8;
        font-size: 0.95rem;
        margin-bottom: 18px;
      }

      .summary {
        color: #cbd5e1;
        font-size: 1.05rem;
        margin-bottom: 24px;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 24px;
      }

      .tag {
        display: inline-block;
        border: 1px solid rgba(148, 163, 184, 0.45);
        color: #e2e8f0;
        background: rgba(30, 41, 59, 0.6);
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
      }

      .tag-react {
        border-color: rgba(34, 211, 238, 0.5);
        color: #67e8f9;
        background: rgba(8, 47, 73, 0.55);
      }

      .tag-cms {
        border-color: rgba(129, 140, 248, 0.5);
        color: #c7d2fe;
        background: rgba(30, 27, 75, 0.6);
      }

      .tag-oauth {
        border-color: rgba(244, 114, 182, 0.5);
        color: #f9a8d4;
        background: rgba(80, 7, 36, 0.55);
      }

      .tag-github-pages {
        border-color: rgba(251, 146, 60, 0.5);
        color: #fdba74;
        background: rgba(67, 20, 7, 0.55);
      }

      .tag-career-growth {
        border-color: rgba(74, 222, 128, 0.6);
        color: #86efac;
        background: rgba(20, 83, 45, 0.6);
      }

      h2, h3, h4 {
        margin-top: 28px;
        margin-bottom: 10px;
        color: #bae6fd;
      }

      p {
        margin: 0 0 16px;
      }

      ul {
        margin: 0 0 18px 20px;
        padding: 0;
      }

      li {
        margin-bottom: 8px;
      }

      figure {
        margin: 18px 0 24px;
      }

      figcaption {
        color: #f8f8f2;
        font-size: 0.8rem;
        margin-bottom: 0;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        background: linear-gradient(90deg, rgba(189, 147, 249, 0.35), rgba(68, 71, 90, 0.85));
        border: 1px solid rgba(189, 147, 249, 0.45);
        border-bottom: none;
        border-radius: 10px 10px 0 0;
        padding: 8px 12px;
      }

      .code-block {
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(255, 121, 198, 0.2), transparent 38%),
          radial-gradient(circle at bottom left, rgba(139, 233, 253, 0.14), transparent 38%),
          #282a36;
        border: 1px solid rgba(98, 114, 164, 0.65);
        border-radius: 0 0 10px 10px;
        border-top: 1px solid rgba(189, 147, 249, 0.25);
        padding: 14px;
        overflow-x: auto;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 12px 28px rgba(10, 10, 20, 0.5);
      }

      .code-block.lang-yaml {
        border-color: rgba(80, 250, 123, 0.4);
      }

      .code-block.lang-javascript {
        border-color: rgba(139, 233, 253, 0.4);
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.9rem;
        color: #f8f8f2;
      }

      .tok-keyword { color: #ff79c6; font-weight: 700; }
      .tok-key { color: #8be9fd; }
      .tok-string { color: #f1fa8c; }
      .tok-number { color: #bd93f9; }
      .tok-boolean { color: #ff5555; font-weight: 700; }
      .tok-operator { color: #ffb86c; }
      .tok-punct { color: #f8f8f2; opacity: 0.8; }
      .tok-comment { color: #6272a4; font-style: italic; }

      .error {
        color: #fecaca;
        background: rgba(127, 29, 29, 0.35);
        border: 1px solid rgba(252, 165, 165, 0.5);
        border-radius: 10px;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <article class="card" id="article">
        <p>Loading preview...</p>
      </article>
    </main>

    <script>
      const fileName = '2026-03-04-learning-in-public-gemini-preview.json';

      const headingTag = (level) => {
        if (level === 3) return 'h3';
        if (level >= 4) return 'h4';
        return 'h2';
      };

      const tagClassFromText = (text = '') =>
        `tag-${String(text)
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '')}`;

      const escapeHtml = (value = '') =>
        value
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

      const highlightYaml = (source = '') => {
        const lines = source.split('\n');
        return lines
          .map((line) => {
            const commentMatch = line.match(/^(\s*#.*)$/);
            if (commentMatch) {
              return `<span class="tok-comment">${escapeHtml(line)}</span>`;
            }

            const keyValueMatch = line.match(/^(\s*)([A-Za-z0-9_-]+)(\s*:\s*)(.*)$/);
            if (!keyValueMatch) {
              return escapeHtml(line);
            }

            const [, indent, key, separator, rawValue] = keyValueMatch;
            let value = escapeHtml(rawValue);

            if (/^\s*(true|false)\s*$/i.test(rawValue)) {
              value = `<span class="tok-boolean">${escapeHtml(rawValue.trim())}</span>`;
            } else if (/^\s*-?\d+(\.\d+)?\s*$/.test(rawValue)) {
              value = `<span class="tok-number">${escapeHtml(rawValue.trim())}</span>`;
            } else if (/['"`]/.test(rawValue) || /https?:\/\//.test(rawValue)) {
              value = `<span class="tok-string">${escapeHtml(rawValue)}</span>`;
            }

            return `${escapeHtml(indent)}<span class="tok-key">${escapeHtml(key)}</span><span class="tok-punct">${escapeHtml(separator)}</span>${value}`;
          })
          .join('\n');
      };

      const highlightJavascript = (source = '') => {
        let output = escapeHtml(source);

        output = output.replace(/(\/\/.*)$/gm, '<span class="tok-comment">$1</span>');
        output = output.replace(/(["'`])((?:\\.|(?!\1).)*)\1/g, '<span class="tok-string">$&</span>');
        output = output.replace(/\b(const|let|var|return|if|else|function|new|typeof|class|import|from|export|default|for|while|map)\b/g, '<span class="tok-keyword">$1</span>');
        output = output.replace(/\b(true|false|null|undefined)\b/g, '<span class="tok-boolean">$1</span>');
        output = output.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="tok-number">$1</span>');
        output = output.replace(/([{}()[\].,;:])/g, '<span class="tok-punct">$1</span>');
        output = output.replace(/(=>|===|!==|==|!=|\+|\-|\*|\/|=)/g, '<span class="tok-operator">$1</span>');

        return output;
      };

      const highlightCode = (source = '', language = '') => {
        const lang = String(language || '').toLowerCase();
        if (lang === 'yaml' || lang === 'yml') return highlightYaml(source);
        if (lang === 'javascript' || lang === 'js') return highlightJavascript(source);
        return escapeHtml(source);
      };

      const render = (data) => {
        const article = document.getElementById('article');
        article.innerHTML = '';

        const h1 = document.createElement('h1');
        h1.textContent = data.title || 'Untitled';
        article.appendChild(h1);

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `${data.publishedAt || ''} • ${data.author || 'Unknown author'}`;
        article.appendChild(meta);

        if (data.summary) {
          const summary = document.createElement('p');
          summary.className = 'summary';
          summary.textContent = data.summary;
          article.appendChild(summary);
        }

        if (Array.isArray(data.tags) && data.tags.length > 0) {
          const tags = document.createElement('div');
          tags.className = 'tags';
          data.tags.forEach((tagText) => {
            const tag = document.createElement('span');
            tag.className = `tag ${tagClassFromText(tagText)}`;
            tag.textContent = tagText;
            tags.appendChild(tag);
          });
          article.appendChild(tags);
        }

        (data.content || []).forEach((block) => {
          if (block.type === 'heading') {
            const tag = headingTag(block.level || 2);
            const node = document.createElement(tag);
            node.textContent = block.text || '';
            article.appendChild(node);
            return;
          }

          if (block.type === 'paragraph') {
            const node = document.createElement('p');
            node.textContent = block.text || '';
            article.appendChild(node);
            return;
          }

          if (block.type === 'list') {
            const node = document.createElement('ul');
            (block.items || []).forEach((item) => {
              const li = document.createElement('li');
              li.textContent = item;
              node.appendChild(li);
            });
            article.appendChild(node);
            return;
          }

          if (block.type === 'code') {
            const figure = document.createElement('figure');
            const cap = document.createElement('figcaption');
            cap.textContent = `${block.caption || 'Code'}${block.language ? ` (${block.language})` : ''}`;

            const pre = document.createElement('pre');
            pre.className = `code-block lang-${block.language || 'plain'}`;
            const code = document.createElement('code');
            code.innerHTML = highlightCode(block.code || '', block.language || '');

            pre.appendChild(code);
            figure.appendChild(cap);
            figure.appendChild(pre);
            article.appendChild(figure);
          }
        });
      };

      fetch(`./${fileName}`)
        .then((res) => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(render)
        .catch((err) => {
          const article = document.getElementById('article');
          article.innerHTML = `<div class="error">Could not load preview JSON (${err.message}).</div>`;
        });
    </script>
  </body>
</html>
